const STORAGE_KEY = 'sql_workbook_data';
let workbook = loadWorkbook();
let currentWeek = 1;

function loadWorkbook() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  } catch { return {}; }
}

function saveWorkbook() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(workbook));
    showSaveIndicator();
  } catch (e) { console.error('Save failed:', e); }
}

function showSaveIndicator() {
  const ind = document.getElementById('saveIndicator');
  ind.classList.add('visible');
  clearTimeout(showSaveIndicator._t);
  showSaveIndicator._t = setTimeout(() => ind.classList.remove('visible'), 1200);
}

function getWeekData(w) {
  if (!workbook[`w${w}`]) workbook[`w${w}`] = {
    skim: {}, anchors: {}, code: {}, leetcode: {}, review: {}, phaseOpen: { a: true }
  };
  return workbook[`w${w}`];
}

function calculateWeekProgress(w) {
  const data = getWeekData(w);
  const week = WEEKS.find(x => x.week === w);
  if (!week) return 0;
  let total = 0, done = 0;
  // Skim items
  week.skim.forEach((_, i) => {
    total++; if (data.skim[i]) done++;
  });
  // Anchor prompts (non-empty)
  week.anchorPrompts.forEach((_, i) => {
    total++; if (data.anchors[i] && data.anchors[i].trim().length > 20) done++;
  });
  // Code challenges (non-empty)
  week.codeChallenges.forEach((_, i) => {
    total++; if (data.code[i] && data.code[i].trim().length > 30) done++;
  });
  // LeetCode (checked)
  week.leetcode.forEach((_, i) => {
    total++; if (data.leetcode[i] && data.leetcode[i].done) done++;
  });
  // Review (at least day-1 filled)
  total++; if (data.review.d1) done++;
  return Math.round(100 * done / total);
}

function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  WEEKS.forEach(w => {
    const link = document.createElement('div');
    link.className = 'week-link' + (w.week === currentWeek ? ' active' : '');
    const pct = calculateWeekProgress(w.week);
    link.innerHTML = `<span>Tuần ${w.week}</span><span class="pct">${pct}%</span>`;
    link.onclick = () => selectWeek(w.week);
    nav.appendChild(link);
  });
  // Global progress
  const totalPct = Math.round(
    WEEKS.reduce((sum, w) => sum + calculateWeekProgress(w.week), 0) / WEEKS.length
  );
  document.getElementById('globalPct').textContent = totalPct + '%';
  document.getElementById('globalBar').style.width = totalPct + '%';
}

function selectWeek(w) {
  currentWeek = w;
  renderSidebar();
  renderMain();
}

function renderMain() {
  const week = WEEKS.find(x => x.week === currentWeek);
  const data = getWeekData(currentWeek);
  const main = document.getElementById('main');

  let html = `
    <div class="week-header">
      <h2>Tuần ${week.week} — ${week.title}</h2>
      <p>${week.sections} sections &middot; Key topics: ${week.keyTopics.join(' &middot; ')}</p>
    </div>

    <div class="key-points">
      <strong>Quy trình học tuần này (~3-4 giờ tổng):</strong>
      Phase A (skim 20') → Phase B (write anchors 60-90') → Phase C (code reproduction 30') → Phase D (LeetCode 60-90') → Phase E (schedule review). Open từng phase và làm tuần tự.
    </div>

    <!-- Phase A -->
    <div class="phase phase-a ${data.phaseOpen.a ? 'open' : ''}" data-phase="a">
      <div class="phase-header" onclick="togglePhase('a')">
        <span>Phase A — Skim &amp; Orient (20 phút)</span>
        <span class="toggle">${data.phaseOpen.a ? '−' : '+'}</span>
      </div>
      <div class="phase-body">
        <p style="font-size:0.92rem;color:#666;margin-bottom:10px;">Mục đích: nắm structure, biết có gì trong tuần. Đừng cố hiểu sâu.</p>
        <ul class="checklist">
  `;
  week.skim.forEach((item, i) => {
    const checked = data.skim[i] ? 'checked' : '';
    html += `
      <li>
        <input type="checkbox" id="skim_${currentWeek}_${i}" ${checked}
               onchange="updateSkim(${i}, this.checked)">
        <label for="skim_${currentWeek}_${i}">${item}</label>
      </li>
    `;
  });
  html += `</ul></div></div>`;

  // Phase B
  html += `
    <div class="phase phase-b ${data.phaseOpen.b ? 'open' : ''}" data-phase="b">
      <div class="phase-header" onclick="togglePhase('b')">
        <span>Phase B — Viết anchor cards của RIÊNG anh (60-90 phút)</span>
        <span class="toggle">${data.phaseOpen.b ? '−' : '+'}</span>
      </div>
      <div class="phase-body">
        <p style="font-size:0.92rem;color:#666;margin-bottom:14px;">
          Đây là phần học chính. Đọc deep từng section của slide, đóng slide, viết câu trả lời bằng ngôn ngữ của anh. Hành động viết tạo trí nhớ; đọc passive không.
        </p>
  `;
  week.anchorPrompts.forEach((prompt, i) => {
    const val = data.anchors[i] || '';
    html += `
      <div class="prompt-block">
        <div class="prompt-label">Prompt ${i + 1}</div>
        <div class="prompt-text">${prompt}</div>
        <textarea oninput="updateAnchor(${i}, this.value)"
                  placeholder="Viết câu trả lời của anh ở đây (ít nhất 1-2 câu hoặc 1 ví dụ)...">${val}</textarea>
      </div>
    `;
  });
  html += `</div></div>`;

  // Phase C
  html += `
    <div class="phase phase-c ${data.phaseOpen.c ? 'open' : ''}" data-phase="c">
      <div class="phase-header" onclick="togglePhase('c')">
        <span>Phase C — Reproduce code từ memory (30 phút)</span>
        <span class="toggle">${data.phaseOpen.c ? '−' : '+'}</span>
      </div>
      <div class="phase-body">
        <p style="font-size:0.92rem;color:#666;margin-bottom:14px;">
          Đọc challenge, gõ lời giải vào textarea KHÔNG nhìn slide. Sau khi xong, click "So với reference" để compare. Note bug nào mình thiếu.
        </p>
  `;
  week.codeChallenges.forEach((ch, i) => {
    const val = data.code[i] || '';
    html += `
      <div class="prompt-block">
        <div class="prompt-label">Challenge ${i + 1}</div>
        <div class="prompt-text">${ch.prompt}</div>
        <textarea class="code" oninput="updateCode(${i}, this.value)"
                  placeholder="-- Gõ SQL của anh ở đây, không nhìn slide...">${val}</textarea>
        <details style="margin-top:8px;">
          <summary style="cursor:pointer;color:#3b5998;font-size:0.88rem;">▸ So với reference</summary>
          <pre style="margin-top:8px;background:#fafffd;border:1px solid #d0e0d8;padding:10px;border-radius:4px;font-size:0.85rem;">${escapeHtml(ch.ref)}</pre>
        </details>
      </div>
    `;
  });
  html += `</div></div>`;

  // Phase D
  html += `
    <div class="phase phase-d ${data.phaseOpen.d ? 'open' : ''}" data-phase="d">
      <div class="phase-header" onclick="togglePhase('d')">
        <span>Phase D — Luyện LeetCode (60-90 phút)</span>
        <span class="toggle">${data.phaseOpen.d ? '−' : '+'}</span>
      </div>
      <div class="phase-body">
        <p style="font-size:0.92rem;color:#666;margin-bottom:14px;">
          Trước mỗi bài, review nhanh anchor cards loại 1 (5'). Note thời gian thực tế giải.
        </p>
        <ul class="leetcode-list">
  `;
  week.leetcode.forEach((lc, i) => {
    const item = data.leetcode[i] || { done: false, time: '' };
    const diffClass = 'lc-' + lc.diff.toLowerCase();
    html += `
      <li>
        <input type="checkbox" ${item.done ? 'checked' : ''}
               onchange="updateLeetcode(${i}, 'done', this.checked)">
        <span class="lc-id">${lc.id}</span>
        <span class="lc-title">${lc.title}</span>
        <span class="lc-difficulty ${diffClass}">${lc.diff}</span>
        <input type="number" placeholder="min" value="${item.time || ''}"
               onchange="updateLeetcode(${i}, 'time', this.value)" min="0">
        <span class="time-label">phút</span>
      </li>
    `;
  });
  html += `</ul></div></div>`;

  // Phase E
  html += `
    <div class="phase phase-e ${data.phaseOpen.e ? 'open' : ''}" data-phase="e">
      <div class="phase-header" onclick="togglePhase('e')">
        <span>Phase E — Spaced Review Schedule</span>
        <span class="toggle">${data.phaseOpen.e ? '−' : '+'}</span>
      </div>
      <div class="phase-body">
        <p style="font-size:0.92rem;color:#666;margin-bottom:14px;">
          Sau khi học tuần xong, đặt lịch review ở 4 mốc. Ghi ngày để track. Anchor cards file dùng cho review nhanh.
        </p>
        <table class="review-table">
          <tr>
            <th>Mốc</th><th>Target</th><th>Ngày review</th><th>Note</th>
          </tr>
          ${renderReviewRow('d1', 'Ngày sau khi học', '5 phút — review anchor cards loại 1', data.review)}
          ${renderReviewRow('d2', 'Ngày thứ 2', '10 phút — anchor + 2 LeetCode đã làm', data.review)}
          ${renderReviewRow('d7', 'Tuần sau', '20 phút — anchor + 1 LeetCode mới cùng pattern', data.review)}
          ${renderReviewRow('d30', 'Tháng sau', '30 phút — full re-test, đo improvement', data.review)}
        </table>
      </div>
    </div>
  `;

  main.innerHTML = html;
}

function renderReviewRow(key, day, target, review) {
  const r = review[key] || {};
  return `
    <tr>
      <td><strong>${day}</strong></td>
      <td class="day-target">${target}</td>
      <td><input type="date" value="${r.date || ''}"
                 onchange="updateReview('${key}', 'date', this.value)"></td>
      <td><input type="text" style="width:100%;padding:4px 8px;border:1px solid #d0d0d0;border-radius:3px;font-family:inherit;"
                 value="${r.note || ''}" placeholder="ghi chú ngắn"
                 onchange="updateReview('${key}', 'note', this.value)"></td>
    </tr>
  `;
}

function togglePhase(p) {
  const data = getWeekData(currentWeek);
  data.phaseOpen[p] = !data.phaseOpen[p];
  saveWorkbook();
  renderMain();
}

function updateSkim(i, v) {
  const data = getWeekData(currentWeek);
  data.skim[i] = v;
  saveWorkbook();
  renderSidebar();
}

function updateAnchor(i, v) {
  const data = getWeekData(currentWeek);
  data.anchors[i] = v;
  saveWorkbook();
  renderSidebar();
}

function updateCode(i, v) {
  const data = getWeekData(currentWeek);
  data.code[i] = v;
  saveWorkbook();
  renderSidebar();
}

function updateLeetcode(i, field, v) {
  const data = getWeekData(currentWeek);
  if (!data.leetcode[i]) data.leetcode[i] = {};
  data.leetcode[i][field] = v;
  saveWorkbook();
  renderSidebar();
}

function updateReview(key, field, v) {
  const data = getWeekData(currentWeek);
  if (!data.review[key]) data.review[key] = {};
  data.review[key][field] = v;
  saveWorkbook();
  renderSidebar();
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function exportData() {
  const data = JSON.stringify(workbook, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `sql-workbook-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        workbook = JSON.parse(ev.target.result);
        saveWorkbook();
        renderSidebar();
        renderMain();
        alert('Import thành công.');
      } catch (err) {
        alert('File không hợp lệ: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function exportMarkdown() {
  let md = `# SQL cho Interview — Anchor Cards của tôi\n\n`;
  md += `Generated: ${new Date().toISOString().split('T')[0]}\n\n`;
  WEEKS.forEach(week => {
    const data = workbook[`w${week.week}`];
    if (!data) return;
    let hasContent = false;
    let weekMd = `\n## Tuần ${week.week} — ${week.title}\n\n`;
    week.anchorPrompts.forEach((prompt, i) => {
      const ans = data.anchors && data.anchors[i];
      if (ans && ans.trim()) {
        hasContent = true;
        weekMd += `**Q${i + 1}: ${prompt}**\n\n${ans}\n\n---\n\n`;
      }
    });
    if (hasContent) md += weekMd;
  });
  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `sql-anchor-cards-${new Date().toISOString().split('T')[0]}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

function resetAll() {
  if (!confirm('Xóa toàn bộ progress, anchor cards anh đã viết, và mọi data trong workbook? Hành động không thể hoàn tác. Tip: export JSON trước để backup.')) return;
  workbook = {};
  saveWorkbook();
  renderSidebar();
  renderMain();
}

renderSidebar();
renderMain();
