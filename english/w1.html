<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>English Games</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card2: #222240;
  --accent: #6c63ff;
  --accent2: #ff6b9d;
  --accent3: #00d2ff;
  --accent4: #ffc107;
  --green: #4ecdc4;
  --red: #ff6b6b;
  --text: #e8e8f0;
  --text2: #8888aa;
  --radius: 16px;
  --safe-top: env(safe-area-inset-top, 20px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}
html, body { 
  height: 100%; overflow: hidden;
  font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text);
  -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none;
  user-select: none; -webkit-user-select: none;
}
body { 
  display: flex; flex-direction: column; 
  padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
}
.app { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* Background effects */
.bg-orbs {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.bg-orbs::before, .bg-orbs::after {
  content: ''; position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15;
}
.bg-orbs::before {
  width: 300px; height: 300px; background: var(--accent); top: -80px; right: -60px;
  animation: orbFloat 8s ease-in-out infinite;
}
.bg-orbs::after {
  width: 250px; height: 250px; background: var(--accent2); bottom: 10%; left: -60px;
  animation: orbFloat 10s ease-in-out infinite reverse;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(30px, 20px); }
}

/* Header */
.header {
  position: relative; z-index: 10; padding: 12px 20px; display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
}
.back-btn {
  width: 40px; height: 40px; border-radius: 12px; background: var(--card2); border: none;
  color: var(--text); font-size: 20px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
}
.back-btn:active { transform: scale(0.9); background: var(--accent); }
.header-info { flex: 1; }
.header-title { font-size: 15px; font-weight: 800; font-family: 'Quicksand', sans-serif; }
.header-sub { font-size: 11px; color: var(--text2); font-weight: 600; }

/* Stats bar */
.stats-bar {
  display: flex; gap: 8px; padding: 0 20px 12px; flex-shrink: 0; position: relative; z-index: 10;
}
.stat-pill {
  display: flex; align-items: center; gap: 5px; background: var(--card); padding: 6px 12px;
  border-radius: 20px; font-size: 12px; font-weight: 700;
}
.stat-pill .icon { font-size: 14px; }
.stat-pill.xp { color: var(--accent4); }
.stat-pill.streak { color: var(--accent2); }
.stat-pill.hearts { color: var(--red); }

/* Progress bar */
.progress-wrap { padding: 0 20px 16px; flex-shrink: 0; position: relative; z-index: 10; }
.progress-bar {
  height: 8px; background: var(--card2); border-radius: 10px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 10px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  background: linear-gradient(90deg, var(--accent), var(--accent3));
}

/* Scrollable content */
.content {
  flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; z-index: 10;
  padding: 0 20px 20px; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.content::-webkit-scrollbar { display: none; }

/* ====== HOME SCREEN ====== */
.home-hero {
  text-align: center; padding: 24px 0 20px;
}
.home-hero h1 {
  font-family: 'Quicksand', sans-serif; font-size: 28px; font-weight: 900;
  background: linear-gradient(135deg, var(--accent3), var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; line-height: 1.2;
}
.home-hero p { color: var(--text2); font-size: 14px; margin-top: 6px; font-weight: 600; }

.home-daily {
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
  position: relative; overflow: hidden; cursor: pointer; transition: transform 0.2s;
}
.home-daily:active { transform: scale(0.97); }
.home-daily::after {
  content: '🔥'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  font-size: 40px; opacity: 0.3;
}
.home-daily h3 { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
.home-daily p { font-size: 12px; opacity: 0.85; font-weight: 600; }

.games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.game-card {
  background: var(--card); border-radius: var(--radius); padding: 20px 16px;
  text-align: center; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  border: 1.5px solid transparent;
}
.game-card:active { transform: scale(0.95); }
.game-card:hover { border-color: rgba(108, 99, 255, 0.3); }
.game-card .emoji { font-size: 36px; margin-bottom: 10px; display: block; }
.game-card .name { font-size: 13px; font-weight: 800; font-family: 'Quicksand', sans-serif; margin-bottom: 3px; }
.game-card .desc { font-size: 10px; color: var(--text2); font-weight: 600; line-height: 1.3; }
.game-card .badge {
  position: absolute; top: 8px; right: 8px; background: var(--accent4); color: #000;
  font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 8px;
}

/* ====== GAME SCREENS ====== */
.question-area { padding: 10px 0; }
.q-label { font-size: 12px; color: var(--accent3); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.q-text {
  font-size: 22px; font-weight: 800; line-height: 1.4; margin-bottom: 6px;
  font-family: 'Quicksand', sans-serif;
}
.q-hint { font-size: 13px; color: var(--text2); font-weight: 600; margin-bottom: 20px; }
.q-context {
  background: var(--card2); border-radius: 12px; padding: 16px; margin-bottom: 20px;
  font-size: 18px; text-align: center; font-weight: 700; line-height: 1.5;
  border-left: 3px solid var(--accent);
}
.q-context .blank {
  display: inline-block; min-width: 80px; border-bottom: 3px dashed var(--accent);
  margin: 0 4px; padding: 0 4px; color: var(--accent); font-weight: 800;
}

/* Option buttons */
.options { display: flex; flex-direction: column; gap: 10px; }
.opt-btn {
  width: 100%; padding: 16px 20px; border-radius: 14px; border: 2px solid var(--card2);
  background: var(--card); color: var(--text); font-size: 15px; font-weight: 700;
  font-family: 'Nunito', sans-serif; cursor: pointer; transition: all 0.2s;
  text-align: left; display: flex; align-items: center; gap: 12px;
  -webkit-appearance: none; appearance: none;
}
.opt-btn:active { transform: scale(0.98); }
.opt-btn .opt-letter {
  width: 28px; height: 28px; border-radius: 8px; background: var(--card2);
  display: flex; align-items: center; justify-content: center; font-size: 12px;
  font-weight: 800; color: var(--text2); flex-shrink: 0;
}
.opt-btn.selected { border-color: var(--accent); background: rgba(108, 99, 255, 0.1); }
.opt-btn.selected .opt-letter { background: var(--accent); color: #fff; }
.opt-btn.correct { 
  border-color: var(--green); background: rgba(78, 205, 196, 0.15);
  animation: correctPop 0.4s ease;
}
.opt-btn.correct .opt-letter { background: var(--green); color: #fff; }
.opt-btn.wrong { 
  border-color: var(--red); background: rgba(255, 107, 107, 0.15);
  animation: shake 0.4s ease;
}
.opt-btn.wrong .opt-letter { background: var(--red); color: #fff; }
.opt-btn:disabled { pointer-events: none; }

@keyframes correctPop { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

/* Word tiles for scramble */
.word-tiles {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 16px;
  min-height: 52px; padding: 12px; background: var(--card2); border-radius: 14px;
  border: 2px dashed rgba(108, 99, 255, 0.3);
}
.tile {
  padding: 10px 16px; border-radius: 10px; background: var(--accent);
  color: #fff; font-size: 16px; font-weight: 800; cursor: pointer;
  transition: all 0.15s; font-family: 'Quicksand', sans-serif;
  -webkit-appearance: none;
}
.tile:active { transform: scale(0.9); }
.tile.in-answer { background: var(--card2); color: var(--text2); pointer-events: none; opacity: 0.3; }
.tile.placed {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
}

.answer-area {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px;
  min-height: 52px; padding: 12px; background: rgba(108, 99, 255, 0.05);
  border-radius: 14px; border: 2px solid rgba(108, 99, 255, 0.2);
}

/* Matching game */
.match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.match-card {
  padding: 16px 12px; border-radius: 14px; background: var(--card);
  border: 2px solid var(--card2); text-align: center; cursor: pointer;
  transition: all 0.2s; font-size: 14px; font-weight: 700; min-height: 60px;
  display: flex; align-items: center; justify-content: center;
  -webkit-appearance: none;
}
.match-card:active { transform: scale(0.95); }
.match-card.selected { border-color: var(--accent); background: rgba(108, 99, 255, 0.15); box-shadow: 0 0 20px rgba(108, 99, 255, 0.2); }
.match-card.matched { 
  border-color: var(--green); background: rgba(78, 205, 196, 0.15); opacity: 0.6;
  pointer-events: none;
}
.match-card.wrong-match {
  border-color: var(--red); background: rgba(255, 107, 107, 0.15);
  animation: shake 0.3s ease;
}
.match-card.en { color: var(--accent3); }
.match-card.vi { color: var(--accent2); }

/* Feedback toast */
.feedback {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  padding: 20px 20px calc(20px + var(--safe-bottom)); transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.feedback.show { transform: translateY(0); }
.feedback-inner {
  border-radius: 20px 20px 0 0; padding: 20px; display: flex; align-items: center; gap: 12px;
}
.feedback.correct .feedback-inner { background: linear-gradient(135deg, #1a4a3a, #0d3d2e); }
.feedback.wrong .feedback-inner { background: linear-gradient(135deg, #4a1a1a, #3d0d0d); }
.feedback-icon { font-size: 28px; }
.feedback-text { flex: 1; }
.feedback-text h4 { font-size: 15px; font-weight: 800; }
.feedback-text p { font-size: 12px; opacity: 0.8; margin-top: 2px; font-weight: 600; }
.feedback .next-btn {
  padding: 10px 24px; border-radius: 12px; border: none; font-size: 14px;
  font-weight: 800; cursor: pointer; font-family: 'Nunito', sans-serif;
  transition: transform 0.2s;
}
.feedback .next-btn:active { transform: scale(0.9); }
.feedback.correct .next-btn { background: var(--green); color: #000; }
.feedback.wrong .next-btn { background: var(--red); color: #fff; }

/* Results screen */
.results {
  text-align: center; padding: 30px 0;
}
.results-emoji { font-size: 64px; margin-bottom: 16px; display: block; }
.results h2 {
  font-family: 'Quicksand', sans-serif; font-size: 26px; font-weight: 900; margin-bottom: 6px;
}
.results .subtitle { color: var(--text2); font-size: 14px; margin-bottom: 24px; font-weight: 600; }
.results-stats { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; }
.result-stat {
  background: var(--card); border-radius: 16px; padding: 16px 20px; min-width: 90px; text-align: center;
}
.result-stat .num { font-size: 28px; font-weight: 900; font-family: 'Quicksand', sans-serif; }
.result-stat .label { font-size: 10px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.result-stat.score .num { color: var(--accent3); }
.result-stat.xp .num { color: var(--accent4); }
.result-stat.accuracy .num { color: var(--green); }

.big-btn {
  width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 16px;
  font-weight: 800; cursor: pointer; font-family: 'Nunito', sans-serif;
  transition: all 0.2s; margin-bottom: 10px;
}
.big-btn:active { transform: scale(0.97); }
.big-btn.primary { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; }
.big-btn.secondary { background: var(--card); color: var(--text); }

/* Sentence builder */
.sentence-display {
  background: var(--card2); border-radius: 14px; padding: 20px; margin-bottom: 20px;
  min-height: 70px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  justify-content: center; border: 2px solid rgba(108, 99, 255, 0.2);
}
.sentence-word {
  padding: 8px 14px; border-radius: 10px; font-size: 15px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff;
  cursor: pointer; transition: all 0.15s;
}
.sentence-word:active { transform: scale(0.9); }
.sentence-cursor {
  width: 2px; height: 24px; background: var(--accent); border-radius: 1px;
  animation: blink 1s infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

.available-words {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
}
.word-btn {
  padding: 10px 16px; border-radius: 10px; background: var(--card);
  border: 2px solid var(--card2); color: var(--text); font-size: 15px;
  font-weight: 700; cursor: pointer; transition: all 0.15s;
  font-family: 'Nunito', sans-serif;
}
.word-btn:active { transform: scale(0.9); }
.word-btn.used { opacity: 0.2; pointer-events: none; }

/* Listen game */
.listen-btn-wrap { text-align: center; margin: 20px 0; }
.listen-btn {
  width: 100px; height: 100px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; font-size: 40px; cursor: pointer; transition: all 0.2s;
  box-shadow: 0 8px 30px rgba(108, 99, 255, 0.4);
}
.listen-btn:active { transform: scale(0.9); }
.listen-btn.playing { animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(108, 99, 255, 0.5); } 50% { box-shadow: 0 0 0 20px rgba(108, 99, 255, 0); } }

.type-input {
  width: 100%; padding: 16px 20px; border-radius: 14px; border: 2px solid var(--card2);
  background: var(--card); color: var(--text); font-size: 18px; font-weight: 700;
  font-family: 'Nunito', sans-serif; text-align: center; outline: none;
  transition: border-color 0.2s;
}
.type-input:focus { border-color: var(--accent); }
.type-input::placeholder { color: var(--text2); }

.check-btn {
  width: 100%; padding: 14px; border-radius: 14px; border: none; margin-top: 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent3));
  color: #fff; font-size: 15px; font-weight: 800; cursor: pointer;
  font-family: 'Nunito', sans-serif; transition: all 0.2s;
}
.check-btn:active { transform: scale(0.97); }
.check-btn:disabled { opacity: 0.3; }

/* Celebration particles */
.confetti-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 200; }
.confetti {
  position: absolute; width: 8px; height: 8px; border-radius: 2px;
  animation: confettiFall 1.5s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* Transitions */
.screen { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Scrollbar hide for iOS */
* { scrollbar-width: none; }
*::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div class="bg-orbs"></div>
<div class="app" id="app"></div>

<script>
// ============ DATA ============
const VOCAB_DATA = [
  // Self introduction
  { en: "name", vi: "tên", sentence: "My ___ is Linh.", answer: "name", ipa: "/neɪm/" },
  { en: "age", vi: "tuổi", sentence: "I am 25 years of ___.", answer: "age", ipa: "/eɪdʒ/" },
  { en: "country", vi: "quốc gia", sentence: "Vietnam is a beautiful ___.", answer: "country", ipa: "/ˈkʌntri/" },
  { en: "job", vi: "công việc", sentence: "What is your ___?", answer: "job", ipa: "/dʒɒb/" },
  { en: "hobby", vi: "sở thích", sentence: "Reading is my ___.", answer: "hobby", ipa: "/ˈhɒbi/" },
  { en: "favorite", vi: "yêu thích", sentence: "My ___ food is pho.", answer: "favorite", ipa: "/ˈfeɪvərɪt/" },
  { en: "friend", vi: "bạn bè", sentence: "She is my best ___.", answer: "friend", ipa: "/frend/" },
  { en: "family", vi: "gia đình", sentence: "I love my ___.", answer: "family", ipa: "/ˈfæməli/" },
  // Daily life
  { en: "morning", vi: "buổi sáng", sentence: "Good ___!", answer: "morning", ipa: "/ˈmɔːnɪŋ/" },
  { en: "evening", vi: "buổi tối", sentence: "Good ___!", answer: "evening", ipa: "/ˈiːvnɪŋ/" },
  { en: "breakfast", vi: "bữa sáng", sentence: "I eat ___ at 7 AM.", answer: "breakfast", ipa: "/ˈbrekfəst/" },
  { en: "lunch", vi: "bữa trưa", sentence: "Let's have ___ together.", answer: "lunch", ipa: "/lʌntʃ/" },
  { en: "dinner", vi: "bữa tối", sentence: "What's for ___?", answer: "dinner", ipa: "/ˈdɪnər/" },
  { en: "water", vi: "nước", sentence: "Can I have some ___?", answer: "water", ipa: "/ˈwɔːtər/" },
  { en: "coffee", vi: "cà phê", sentence: "I drink ___ every day.", answer: "coffee", ipa: "/ˈkɒfi/" },
  { en: "food", vi: "đồ ăn", sentence: "Vietnamese ___ is delicious.", answer: "food", ipa: "/fuːd/" },
  // Feelings & descriptions
  { en: "happy", vi: "vui vẻ", sentence: "I feel very ___ today.", answer: "happy", ipa: "/ˈhæpi/" },
  { en: "tired", vi: "mệt mỏi", sentence: "I am so ___ after work.", answer: "tired", ipa: "/taɪəd/" },
  { en: "beautiful", vi: "đẹp", sentence: "The sunset is ___.", answer: "beautiful", ipa: "/ˈbjuːtɪfəl/" },
  { en: "weather", vi: "thời tiết", sentence: "The ___ is nice today.", answer: "weather", ipa: "/ˈweðər/" },
  { en: "cold", vi: "lạnh", sentence: "It is very ___ in winter.", answer: "cold", ipa: "/koʊld/" },
  { en: "hot", vi: "nóng", sentence: "Vietnam is very ___ in summer.", answer: "hot", ipa: "/hɒt/" },
  // Actions
  { en: "work", vi: "làm việc", sentence: "I ___ at a company.", answer: "work", ipa: "/wɜːk/" },
  { en: "study", vi: "học", sentence: "I ___ English every day.", answer: "study", ipa: "/ˈstʌdi/" },
  { en: "travel", vi: "du lịch", sentence: "I want to ___ to Japan.", answer: "travel", ipa: "/ˈtrævəl/" },
  { en: "cook", vi: "nấu ăn", sentence: "I like to ___ for my family.", answer: "cook", ipa: "/kʊk/" },
  { en: "sleep", vi: "ngủ", sentence: "I ___ at 11 PM.", answer: "sleep", ipa: "/sliːp/" },
  { en: "read", vi: "đọc", sentence: "I ___ books before bed.", answer: "read", ipa: "/riːd/" },
];

const GRAMMAR_QS = [
  { q: "Chọn câu ĐÚNG:", opts: ["I am like coffee.", "I like coffee.", "I am coffee like.", "I do like am coffee."], correct: 1, explain: "Dùng 'I like' (không cần 'am') cho động từ thường" },
  { q: "\"Tôi đến từ Việt Nam\" là:", opts: ["I am come from Vietnam.", "I come from Vietnam.", "I from Vietnam come.", "I am from come Vietnam."], correct: 1, explain: "'Come' là động từ thường, không cần 'am'" },
  { q: "Điền vào chỗ trống: \"___ you like cooking?\"", opts: ["Are", "Do", "Is", "Am"], correct: 1, explain: "Dùng 'Do' cho câu hỏi với động từ thường" },
  { q: "Chọn câu ĐÚNG:", opts: ["She have two cats.", "She has two cats.", "She am have two cats.", "She is has two cats."], correct: 1, explain: "He/She/It + has (không cần 'am/is')" },
  { q: "Phủ định đúng của 'I like rain':", opts: ["I no like rain.", "I don't like rain.", "I am not like rain.", "I not like rain."], correct: 1, explain: "Phủ định: I don't + động từ thường" },
  { q: "\"Bạn có khỏe không?\" là:", opts: ["Do you happy?", "Are you fine?", "Is you fine?", "You are fine?"], correct: 1, explain: "Dùng 'Are you' + tính từ cho câu hỏi" },
  { q: "Chọn câu ĐÚNG:", opts: ["I am a teacher.", "I am teacher.", "I a teacher.", "I teacher am."], correct: 0, explain: "I am + a/an + nghề nghiệp" },
  { q: "\"Anh ấy làm việc ở ngân hàng\" là:", opts: ["He work at a bank.", "He works at a bank.", "He is work at a bank.", "He working a bank."], correct: 1, explain: "He/She/It + động từ thêm 's'" },

// ============ HELPERS ============
function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function pick(arr, n) { return shuffle(arr).slice(0, n); }

function speak(text, rate = 0.85) {
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = rate; u.pitch = 1;
    speechSynthesis.speak(u);
  }
}

function confetti() {
  const c = document.createElement('div');
  c.className = 'confetti-container';
  document.body.appendChild(c);
  const colors = ['#6c63ff', '#ff6b9d', '#00d2ff', '#ffc107', '#4ecdc4', '#ff6b6b'];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'confetti';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDelay = Math.random() * 0.5 + 's';
    p.style.animationDuration = (1 + Math.random()) + 's';
    c.appendChild(p);
  }
  setTimeout(() => c.remove(), 2500);
}

// ============ GAME LOGIC ============
function startGame(game) {
  state = { ...state, screen: 'game', game, questionIndex: 0, score: 0, answered: false, 
    selectedAnswer: null, lastCorrect: false, feedbackText: '', placedWords: [], matchedPairs: 0, selectedCard: null, typedAnswer: '' };
  
  switch (game) {
    case 'vocab': state.questions = generateVocabQs(); break;
    case 'fill': state.questions = generateFillQs(); break;
    case 'grammar': state.questions = generateGrammarQs(); break;
    case 'build': state.questions = generateBuildQs(); break;
    case 'listen': state.questions = generateListenQs(); break;
    case 'match': state.questions = generateMatchQs(); break;
    case 'daily': state.questions = generateDailyQs(); break;
  }
  state.totalQuestions = state.questions.length;
  
  if (state.questions[0] && state.questions[0].type === 'build') initBuildQ(state.questions[0]);
  if (state.questions[0] && state.questions[0].type === 'match') initMatchQ(state.questions[0]);
  
  render();
}

function generateVocabQs() {
  const items = pick(VOCAB_DATA, 8);
  return items.map(item => {
    const wrong = pick(VOCAB_DATA.filter(v => v.vi !== item.vi), 3).map(v => v.vi);
    const opts = shuffle([item.vi, ...wrong]);
    return { type: 'vocab', en: item.en, ipa: item.ipa, opts, correctIdx: opts.indexOf(item.vi) };
  });
}

function generateFillQs() {
  const items = pick(VOCAB_DATA.filter(v => v.sentence), 8);
  return items.map(item => {
    const wrong = pick(VOCAB_DATA.filter(v => v.en !== item.en), 3).map(v => v.en);
    const opts = shuffle([item.answer, ...wrong]);
    return { type: 'fill', sentence: item.sentence.replace(item.answer, '___'), answer: item.answer, vi: item.vi, opts, correctIdx: opts.indexOf(item.answer) };
  });
}

function generateGrammarQs() {
  return pick(GRAMMAR_QS, 8).map(q => ({ type: 'grammar', ...q }));
}

function generateBuildQs() {
  return pick(SENTENCES_BUILD, 8).map(s => ({ type: 'build', ...s, words: shuffle(s.words) }));
}

function generateListenQs() {
  return pick(VOCAB_DATA, 8).map(v => ({ type: 'listen', en: v.en, vi: v.vi, ipa: v.ipa }));
}

function generateMatchQs() {
  const sets = [];
  for (let i = 0; i < 2; i++) {
    const items = pick(VOCAB_DATA, 4);
    sets.push({ type: 'match', pairs: items.map(v => ({ en: v.en, vi: v.vi })) });
  }
  return sets;
}

function generateDailyQs() {
  const qs = [];
  qs.push(...generateVocabQs().slice(0, 2));
  qs.push(...generateFillQs().slice(0, 2));
  qs.push(...generateGrammarQs().slice(0, 2));
  qs.push(...generateBuildQs().slice(0, 1));
  qs.push(...generateListenQs().slice(0, 1));
  return shuffle(qs);
}

function initBuildQ(q) {
  state.placedWords = [];
  state.availableWords = [...q.words];
}

function initMatchQ(q) {
  const cards = [];
  q.pairs.forEach((p, i) => {
    cards.push({ text: p.en, lang: 'en', pairId: i, matched: false, wrongFlash: false });
    cards.push({ text: p.vi, lang: 'vi', pairId: i, matched: false, wrongFlash: false });
  });
  state.matchCards = shuffle(cards);
  state.matchedPairs = 0;
  state.selectedCard = null;
}

// ============ ANSWER HANDLERS ============
function answerVocab(idx) {
  if (state.answered) return;
  const q = state.questions[state.questionIndex];
  state.answered = true;
  state.selectedAnswer = idx;
  const correct = idx === q.correctIdx;
  state.lastCorrect = correct;
  if (correct) { state.score++; state.feedbackText = `"${q.en}" = ${q.opts[q.correctIdx]}`; confetti(); speak(q.en); }
  else { state.feedbackText = `Đáp án đúng: ${q.opts[q.correctIdx]}`; state.hearts = Math.max(0, state.hearts - 1); }
  render();
}

function answerFill(idx) {
  if (state.answered) return;
  const q = state.questions[state.questionIndex];
  state.answered = true;
  state.selectedAnswer = idx;
  const correct = idx === q.correctIdx;
  state.lastCorrect = correct;
  if (correct) { state.score++; state.feedbackText = `${q.sentence.replace('___', q.answer)}`; confetti(); speak(q.sentence.replace('___', q.answer)); }
  else { state.feedbackText = `Đáp án: "${q.answer}"`; state.hearts = Math.max(0, state.hearts - 1); }
  render();
}

function answerGrammar(idx) {
  if (state.answered) return;
  const q = state.questions[state.questionIndex];
  state.answered = true;
  state.selectedAnswer = idx;
  const correct = idx === q.correct;
  state.lastCorrect = correct;
  if (correct) { state.score++; state.feedbackText = q.explain; confetti(); }
  else { state.feedbackText = q.explain; state.hearts = Math.max(0, state.hearts - 1); }
  render();
}

function placeWord(word, idx) {
  if (state.answered) return;
  // Track by index to handle duplicates
  const usedIndices = state.placedWords.map(pw => pw.idx);
  if (usedIndices.includes(idx)) return;
  state.placedWords.push({ word, idx });
  render();
}

function removePlacedWord(i) {
  if (state.answered) return;
  state.placedWords.splice(i, 1);
  render();
}

function checkBuild() {
  const q = state.questions[state.questionIndex];
  const placed = state.placedWords.map(pw => pw.word);
  const correct = placed.join(' ') === q.answer.join(' ');
  state.answered = true;
  state.lastCorrect = correct;
  if (correct) { state.score++; state.feedbackText = placed.join(' '); confetti(); speak(q.answer.join(' ')); }
  else { state.feedbackText = `Đáp án: ${q.answer.join(' ')}`; state.hearts = Math.max(0, state.hearts - 1); }
  render();
}

function playListenWord() {
  const q = state.questions[state.questionIndex];
  speak(q.en, 0.7);
  const btn = document.getElementById('listenBtn');
  if (btn) { btn.classList.add('playing'); setTimeout(() => btn.classList.remove('playing'), 1500); }
}

function checkListen() {
  const q = state.questions[state.questionIndex];
  const correct = state.typedAnswer.trim().toLowerCase() === q.en.toLowerCase();
  state.answered = true;
  state.lastCorrect = correct;
  if (correct) { state.score++; state.feedbackText = `✓ "${q.en}" ${q.ipa}`; confetti(); }
  else { state.feedbackText = `Đáp án: "${q.en}" ${q.ipa}`; state.hearts = Math.max(0, state.hearts - 1); }
  render();
}

function selectMatchCard(idx) {
  if (state.answered) return;
  const card = state.matchCards[idx];
  if (card.matched) return;
  
  if (state.selectedCard === null) {
    state.selectedCard = idx;
    render();
  } else if (state.selectedCard === idx) {
    state.selectedCard = null;
    render();
  } else {
    const prev = state.matchCards[state.selectedCard];
    if (prev.pairId === card.pairId && prev.lang !== card.lang) {
      // Match!
      prev.matched = true;
      card.matched = true;
      state.matchedPairs++;
      state.selectedCard = null;
      
      const q = state.questions[state.questionIndex];
      if (state.matchedPairs >= q.pairs.length) {
        state.answered = true;
        state.lastCorrect = true;
        state.score++;
        state.feedbackText = `Ghép đúng tất cả ${q.pairs.length} cặp!`;
        confetti();
      }
      render();
    } else {
      // No match
      card.wrongFlash = true;
      prev.wrongFlash = true;
      state.selectedCard = null;
      render();
      setTimeout(() => {
        card.wrongFlash = false;
        prev.wrongFlash = false;
        render();
      }, 400);
    }
  }
}

function nextQuestion() {
  state.questionIndex++;
  state.answered = false;
  state.selectedAnswer = null;
  state.feedbackText = '';
  state.typedAnswer = '';
  
  if (state.questionIndex >= state.totalQuestions) {
    state.screen = 'results';
    state.xp += state.score * 10;
    state.streak++;
    confetti();
  } else {
    const q = state.questions[state.questionIndex];
    if (q && q.type === 'build') initBuildQ(q);
    if (q && q.type === 'match') initMatchQ(q);
  }
  render();
}

function goHome() {
  state.screen = 'home';
  state.hearts = Math.max(state.hearts, 3);
  render();
}

function bindEvents() {
  // Auto-play listen word when entering listen question
  const q = state.questions && state.questions[state.questionIndex];
  if (q && q.type === 'listen' && !state.answered) {
    setTimeout(() => playListenWord(), 500);
  }
  
  // Focus input for listen
  const input = document.getElementById('listenInput');
  if (input && !state.answered) {
    setTimeout(() => input.focus(), 300);
  }
  
  // Enable check button reactivity
  const checkBtn = document.querySelector('.check-btn');
  if (input && checkBtn) {
    input.addEventListener('input', () => {
      state.typedAnswer = input.value;
      checkBtn.disabled = !input.value.trim();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && input.value.trim()) checkListen();
    });
  }
}

// Fix placeWord for build questions to handle duplicates properly
const origRenderBuildQ = renderBuildQ;
renderBuildQ = function(q) {
  const usedIndices = state.placedWords.map(pw => pw.idx);
  return `
    <div class="question-area">
      <div class="q-label">Xây câu</div>
      <div class="q-text">${q.vi}</div>
      <div class="q-hint">Sắp xếp các từ thành câu đúng</div>
      <div class="sentence-display">
        ${state.placedWords.map((pw, i) => `<span class="sentence-word" onclick="removePlacedWord(${i})">${pw.word}</span>`).join('')}
        ${!state.answered ? '<span class="sentence-cursor"></span>' : ''}
      </div>
      <div class="available-words">
        ${state.availableWords.map((w, i) => `
          <button class="word-btn ${usedIndices.includes(i) ? 'used' : ''}"
            onclick="placeWord('${w}', ${i})" ${state.answered ? 'disabled' : ''}>${w}</button>
        `).join('')}
      </div>
      ${!state.answered && state.placedWords.length > 0 ? `<button class="check-btn" onclick="checkBuild()">Kiểm tra ✓</button>` : ''}
    </div>`;
};

// ============ INIT ============
render();
</script>
